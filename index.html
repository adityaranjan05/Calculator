<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div id="calculator_wrapper">
      <div class="output_window"></div>
      <table>
        <tr class="button_rows">
          <td class="buttons">%</td>
          <td class="buttons">x^2</td>
          <td class="buttons">C</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">1/x</td>
          <td class="buttons">&radic;x</td>
          <td class="buttons divide">/</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">7</td>
          <td class="buttons">8</td>
          <td class="buttons">9</td>
          <td class="buttons multiply">*</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">4</td>
          <td class="buttons">5</td>
          <td class="buttons">6</td>
          <td class="buttons">-</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">1</td>
          <td class="buttons">2</td>
          <td class="buttons">3</td>
          <td class="buttons">+</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">+/-</td>
          <td class="buttons">0</td>
          <td class="buttons">.</td>
          <td class="buttons">=</td>
        </tr>
      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
