<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div id="calculator_wrapper">
      <div class="output_window"></div>
      <table>
        <tr class="button_rows">
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">%</td>
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">x^2</td>
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">C</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">1/x</td>
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">&radic;x</td>
          <td class="buttons divide" style="color: rgb(24, 128, 24); font-weight: bolder;">/</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">7</td>
          <td class="buttons">8</td>
          <td class="buttons">9</td>
          <td class="buttons multiply" style="color: rgb(24, 128, 24); font-weight: bolder; font-size: 2rem;">*</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">4</td>
          <td class="buttons">5</td>
          <td class="buttons">6</td>
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">-</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">1</td>
          <td class="buttons">2</td>
          <td class="buttons">3</td>
          <td class="buttons" style="color: rgb(24, 128, 24); font-weight: bolder;">+</td>
        </tr>
        <tr class="button_rows">
          <td class="buttons">+/-</td>
          <td class="buttons">0</td>
          <td class="buttons">.</td>
          <td class="buttons" style="background-color: rgb(255, 115, 0); font-size: 2rem; font-weight: bold;">=</td>
        </tr>
      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
